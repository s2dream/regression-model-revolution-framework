# =====================================================================
# 🚀 Antigravity AutoML Regression Framework - Custom Features Profile
# =====================================================================

logging:
  log_dir: "logs"
  console_level: "INFO"

framework:
  random_state: 42
  active_models:
    - XGBoost
    - RandomForest

data:
  data_dir: "data"
  output_dir: "outputs"
  target_column: "Target_Y"
  feature_columns:
    - "Feature_Num"  # Explicitly select only Feature_Num column as X
  split:
    method: "train_test_split"
    test_size: 0.2

models:
  XGBoost:
    n_estimators: 50
    learning_rate: 0.1
    max_depth: 4
    n_jobs: -1
  
  RandomForest:
    n_estimators: 50
    max_depth: null
    n_jobs: -1
